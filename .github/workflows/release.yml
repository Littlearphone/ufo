# 推送 tag 时自动构建对应组件，创建 Release Draft
# tag 格式：<包名>@<版本号>  例如 timeline-track@2.1.0

name: Create Release

on:
  push:
    tags:
      - '*@*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 从 tag 中解析包名和版本号
      # tag 格式：timeline-track@2.1.0 → package=timeline-track, version=2.1.0
      - name: Parse tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PACKAGE=${TAG%@*}
          VERSION=${TAG#*@}
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # 只构建对应组件的 demo + 库
      - name: Build package
        run: |
          cd "packages/${{ steps.tag.outputs.package }}"
          pnpm run build:all

      # 列出构建产物（用于调试）
      - name: List artifacts
        run: |
          ls -lh "packages/${{ steps.tag.outputs.package }}/dist/"

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "${{ steps.tag.outputs.package }} v${{ steps.tag.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            packages/${{ steps.tag.outputs.package }}/dist/*.js
            packages/${{ steps.tag.outputs.package }}/dist/index.html
          fail_on_unmatched_files: true
